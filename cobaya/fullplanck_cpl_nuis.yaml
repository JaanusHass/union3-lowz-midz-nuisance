theory:
  camb:
    extra_args:
      dark_energy_model: ppf
      lens_potential_accuracy: 1
      num_massive_neutrinos: 1
      nnu: 3.044
      theta_H0_range: [20, 100]

likelihood:
  planck_2018_lowl.TT:
  planck_2018_lowl.EE:
  planck_NPIPE_highl_CamSpec.TTTEEE:
  bao.desi_2024_bao_all:
  my_union3.Union3Nuisance:
    python_path: .

params:
  logA:
    prior: {min: 1.61, max: 3.91}
    ref: {dist: norm, loc: 3.05, scale: 0.001}
    proposal: 0.001
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  As:
    value: "lambda logA: 1e-10*np.exp(logA)"
    latex: A_\mathrm{s}
  ns:
    prior: {min: 0.8, max: 1.2}
    ref: {dist: norm, loc: 0.965, scale: 0.004}
    proposal: 0.002
    latex: n_\mathrm{s}
  theta_MC_100:
    prior: {min: 0.5, max: 10}
    ref: {dist: norm, loc: 1.04109, scale: 0.0004}
    proposal: 0.0002
    latex: 100\theta_\mathrm{MC}
    drop: true
    renames: theta
  cosmomc_theta:
    value: "lambda theta_MC_100: 1.e-2*theta_MC_100"
    derived: false
  H0:
    latex: H_0
    min: 20
    max: 100
  ombh2:
    prior: {min: 0.005, max: 0.1}
    ref: {dist: norm, loc: 0.02237, scale: 0.0001}
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
  omch2:
    prior: {min: 0.001, max: 0.99}
    ref: {dist: norm, loc: 0.1200, scale: 0.001}
    proposal: 0.0005
    latex: \Omega_\mathrm{c} h^2
  tau:
    prior: {dist: norm, loc: 0.0544, scale: 0.0073}
    ref: {dist: norm, loc: 0.055, scale: 0.006}
    proposal: 0.003
    latex: \tau_\mathrm{reio}
  mnu:
    value: 0.06
  w:
    prior: {min: -3.0, max: 1.0}
    ref: -0.9
    proposal: 0.05
    latex: w_0
  wa:
    prior: {min: -3.0, max: 2.0}
    ref: -0.3
    proposal: 0.1
    latex: w_a
  a_nuis:
    prior: {min: -0.5, max: 0.5}
    ref: 0.0
    proposal: 0.01
    latex: a_\mathrm{nuis}
  omegam:
    latex: \Omega_\mathrm{m}

sampler:
  mcmc:
    Rminus1_stop: 0.05
    max_tries: 10000

output: chains/fullplanck
